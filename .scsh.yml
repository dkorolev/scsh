# .scsh.yml — Scoped Skills Helper. Skills below were added by `scsh installskills`.
# The whole file is just your skills; scsh builds them on a built-in base image.
# Run `scsh help .scsh.yml` for the schema, or `scsh help` for commands.
skills:
  conventions-reviewer:
    profile: code-review
    timeout: 1200
    result: tmp/code-review-conventions-reviewer-{name}.json
    invocations:
      codex-terra:
        harness: codex
        model: gpt-5.6-terra
        effort: high
      claude-opus-4-8:
        harness: claude
        model: claude-opus-4-8
      cursor-auto:
        harness: cursor
        model: auto
  justification-reviewer:
    profile: code-review
    timeout: 1200
    result: tmp/code-review-justification-reviewer-{name}.json
    invocations:
      codex-terra:
        harness: codex
        model: gpt-5.6-terra
        effort: high
      claude-opus-4-8:
        harness: claude
        model: claude-opus-4-8
      cursor-auto:
        harness: cursor
        model: auto
  reviewability-reviewer:
    profile: code-review
    timeout: 1200
    result: tmp/code-review-reviewability-reviewer-{name}.json
    invocations:
      codex-terra:
        harness: codex
        model: gpt-5.6-terra
        effort: high
      claude-opus-4-8:
        harness: claude
        model: claude-opus-4-8
      cursor-auto:
        harness: cursor
        model: auto
  sanity-reviewer:
    profile: code-review
    timeout: 1200
    result: tmp/code-review-sanity-reviewer-{name}.json
    invocations:
      codex-terra:
        harness: codex
        model: gpt-5.6-terra
        effort: high
      claude-opus-4-8:
        harness: claude
        model: claude-opus-4-8
      cursor-auto:
        harness: cursor
        model: auto
  testing-reviewer:
    profile: code-review
    timeout: 1200
    result: tmp/code-review-testing-reviewer-{name}.json
    invocations:
      codex-terra:
        harness: codex
        model: gpt-5.6-terra
        effort: high
      claude-opus-4-8:
        harness: claude
        model: claude-opus-4-8
      cursor-auto:
        harness: cursor
        model: auto
  big-beautiful-build:
    harness: codex
    model: gpt-5.6-terra
    effort: high
    timeout: 1200
    profile: big-beautiful-build
    result: tmp/big-beautiful-build.md
  fast-beautiful-forward:
    harness: codex
    model: gpt-5.6-terra
    effort: high
    timeout: 1200
    profile: fast-beautiful-forward
    result: tmp/fast-beautiful-forward.md
  code-beautiful-review:
    harness: codex
    model: gpt-5.6-terra
    effort: high
    timeout: 1200
    profile: code-beautiful-review
    result: tmp/code-beautiful-review.md
  prepare-beautiful-pr:
    harness: codex
    model: gpt-5.6-terra
    effort: high
    timeout: 1200
    profile: prepare-beautiful-pr
    result: tmp/prepare-beautiful-pr.md
  the-beautiful-loop:
    harness: codex
    model: gpt-5.6-terra
    effort: high
    timeout: 7200
    profile: the-beautiful-loop
    result: tmp/the-beautiful-loop.md
  send-beautiful-pr:
    harness: codex
    model: gpt-5.6-terra
    effort: high
    timeout: 1200
    profile: send-beautiful-pr
    result: tmp/send-beautiful-pr.md
  harness-smoke:
    profile: harness-smoke
    timeout: 600
    result: tmp/harness-smoke-{name}.json
    invocations:
      claude-opus-4-8:
        harness: claude
        model: claude-opus-4-8
      codex-luna:
        harness: codex
        model: gpt-5.6-luna
        effort: low
      cursor-composer-fast:
        harness: cursor
        model: composer-2.5-fast
      # The local-agents-credentials profile (TEST-LOCAL-AGENTS-CREDENTIALS.md): the same
      # smoke workload, but one route per subscription-first harness — claude, codex,
      # cursor, grok — to prove host credentials reach every authenticated model. Routes
      # whose harness is unavailable are skipped, not failed.
      creds-claude-opus-4-8:
        harness: claude
        model: claude-opus-4-8
        profile: local-agents-credentials
      creds-codex-luna:
        harness: codex
        model: gpt-5.6-luna
        effort: low
        profile: local-agents-credentials
      creds-cursor-composer-fast:
        harness: cursor
        model: composer-2.5-fast
        profile: local-agents-credentials
      creds-grok-build:
        harness: grok
        model: grok-build
        effort: low
        profile: local-agents-credentials
