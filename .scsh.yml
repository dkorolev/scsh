# .scsh.yml — Scoped Skills Helper. Skills below were added by `scsh installskills`.
# The whole file is just your skills; scsh builds them on a built-in base image.
# Run `scsh help .scsh.yml` for the schema, or `scsh help` for commands.
skills:
  conventions-reviewer:
    profile: code-review
    timeout: 1200
    result: tmp/code-review-conventions-reviewer-{name}.json
    invocations:
      codex-gpt-5.5:
        harness: codex
        model: gpt-5.5
        effort: high
      claude-opus-4-8:
        harness: claude
        model: claude-opus-4-8
      grok-build:
        harness: grok
        model: grok-build
        effort: high
