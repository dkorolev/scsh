# .scsh.yml — Scoped Skills Helper project configuration
# Generated by `scsh --init-demo-project`. Edit freely; see the README for the schema.
# The whole file is just your skills — scsh builds them on a built-in base image
# (Debian, with opencode + a dev toolchain added). Run `scsh help .scsh.yml` for fields.

# Each skill key matches its `.skills/<name>/` folder. Declare either direct run
# fields (`harness`, optional `model`, …) or an `invocations:` matrix — each route
# expands to `{skill}-{route}` at run time.
skills:
  add:
    timeout: 600
    env:
      - A: ${A:-2}
      - B: ${B:-3}
    result: tmp/add_{name}_result.json
    invocations:
      opencode-gpt-5.4-mini-fast:
        harness: opencode
        model: openai/gpt-5.4-mini-fast
        commits: true
      claude-sonnet-4-6:
        harness: claude
        model: sonnet
  subtract:
    timeout: 600
    env:
      - C: ${C:-10}
      - D: ${D:-4}
    result: tmp/subtract_{name}_result.json
    invocations:
      opencode-gpt-5.4-mini-fast:
        harness: opencode
        model: openai/gpt-5.4-mini-fast
        commits: true
  multiply:
    profile: multiply
    timeout: 600
    env:
      - X: ${X}
      - Y: ${Y}
    result: tmp/multiply_{name}_result.json
    invocations:
      opencode-gpt-5.4-mini-fast:
        harness: opencode
        model: openai/gpt-5.4-mini-fast
      claude-sonnet-4-6:
        harness: claude
        model: sonnet
  # Minimal fake-PR: two files (feature note + PR-DESCRIPTION.md), two commits, packdiff
  # Description panel. One route per agent so you can pick a flavor.
  demo-pr:
    timeout: 600
    env:
      - TITLE: ${TITLE:-Hello from demo-pr}
    result: tmp/demo_pr_{name}_result.json
    invocations:
      claude-sonnet:
        harness: claude
        model: sonnet
        commits: true
      codex-gpt-5.5:
        harness: codex
        model: gpt-5.5
        commits: true
      grok-build:
        harness: grok
        model: grok-build
        commits: true
      cursor-composer-fast:
        harness: cursor
        model: composer-2.5-fast
        commits: true
