skills:
  add-opencode-gpt:
    skill: add
    harness: opencode
    model: openai/gpt-5.4-mini-fast
    timeout: 600
    env:
      - A: ${A:-2}
      - B: ${B:-3}
    result: tmp/add_opencode_gpt_result.json
  add-claude-sonnet:
    skill: add
    harness: claude
    model: sonnet
    timeout: 600
    env:
      - A: ${A:-2}
      - B: ${B:-3}
    result: tmp/add_claude_sonnet_result.json
